animations {
    enabled = true

    # Bezier curves
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = softSnap, 0.4, 0, 0.2, 1
    bezier = fluent, 0.0, 0.0, 0.2, 1.0
    bezier = easeInOutExpo, 0.87, 0, 0.13, 1

    # Windows
    animation = windows, 1, 5, overshot, popin 80%
    animation = windowsIn, 1, 5, overshot, popin 80%
    animation = windowsOut, 1, 2, smoothOut, popin 95%
    animation = windowsMove, 1, 4, softSnap

    # Layers
    animation = layersIn, 1, 1, smoothIn, slide right
    animation = layersOut, 1, 1, softSnap, slide right

    # Fade
    animation = fade, 1, 1, smoothIn
    animation = fadeIn, 1, 1, smoothIn
    animation = fadeOut, 1, 1, smoothOut
    animation = fadeSwitch, 1, 4, smoothIn
    animation = fadeShadow, 1, 4, smoothIn
    animation = fadeDim, 1, 1, smoothIn
    animation = fadeDpms, 1, 1, smoothIn
    animation = fadeLayers, 1, 1, softSnap

    # Workspaces
    animation = workspaces, 1, 5, overshot, slide 
    animation = specialWorkspace, 1, 5, overshot, slide
}
